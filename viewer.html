<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>siege</title>
<style>
  html,body{margin:0;height:100%;background:#8fc3e8;overflow:hidden;
    font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;color:#1c2530}
  canvas{display:block;touch-action:none}
  /* draggable bottom-centre dock; the grid toggles between castles and weapons */
  .dock{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
    background:#ffffffdd;border:1px solid #b9c7d4;border-radius:8px;padding:8px 10px 10px;
    backdrop-filter:blur(6px);box-shadow:0 4px 20px #0002;user-select:none;z-index:3}
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:move;touch-action:none}
  .grip{flex:none;width:9px;height:16px;opacity:.7;
    background-image:radial-gradient(#8a99a8 1.1px,transparent 1.2px);background-size:4px 5px}
  .bar:hover .grip{opacity:1}
  .minlabel{display:none;font-size:11px;letter-spacing:.14em;font-weight:600;color:#7c8b9a}
  .spacer{flex:1}
  .seg{display:flex;border:1px solid #c6d2dc;border-radius:5px;overflow:hidden;cursor:default}
  .seg button{font:inherit;font-size:11px;letter-spacing:.1em;font-weight:600;
    padding:3px 12px;cursor:pointer;border:0;background:#eef3f8;color:#7c8b9a}
  .seg button+button{border-left:1px solid #c6d2dc}
  .seg button:hover{color:#2f6fb0}
  .seg button.on{background:#cfe4f7;color:#0f1721}
  .rounds{font-size:11px;color:#5b6b7c;letter-spacing:.04em;cursor:default}
  .rounds b{color:#0f1721;font-size:15px;font-weight:600}
  .rounds.low b{color:#a8482f}
  .mini{font:inherit;font-size:11px;padding:2px 9px;cursor:pointer;color:#2f6fb0;
    background:#eef3f8;border:1px solid #c6d2dc;border-radius:4px}
  .mini:hover{border-color:#2f6fb0;background:#e2edf8}
  .mini.hide{display:none}
  .iconbtn{font:inherit;font-size:15px;line-height:1;width:20px;height:20px;flex:none;
    display:grid;place-items:center;cursor:pointer;color:#5b6b7c;
    background:#eef3f8;border:1px solid #c6d2dc;border-radius:4px}
  .iconbtn:hover{border-color:#2f6fb0;color:#2f6fb0}
  #sndbtn .slash{display:none}
  #sndbtn.off{color:#a8482f}
  #sndbtn.off .wave{display:none}
  #sndbtn.off .slash{display:inline}
  /* minimized: just a small draggable pill (grip + label + expand) */
  .dock.min{padding:6px 8px}
  .dock.min .bar{margin-bottom:0}
  .dock.min .grid,.dock.min .seg,.dock.min #loadbtn,.dock.min #roundsWrap,.dock.min #sndbtn{display:none}
  .dock.min .minlabel{display:inline}
  /* the 6x3 grid */
  .grid{display:grid;grid-template-columns:repeat(6,46px);grid-auto-rows:46px;gap:5px}
  .slot{position:relative;display:grid;place-items:center;padding:0;cursor:pointer;
    background:#eef3f8;border:1px solid #c6d2dc;border-radius:6px;color:#3a4d61;
    transition:border-color .12s,background .12s,color .12s,box-shadow .12s}
  .slot:hover{border-color:#2f6fb0;color:#123650;background:#e6f0fa}
  .slot.on{background:#cfe4f7;border-color:#2f6fb0;color:#0f1721;box-shadow:inset 0 0 0 1px #2f6fb0}
  .slot.locked{cursor:default;border-style:dashed;border-color:#cfd9e2;
    background:#f2f5f9;color:#c2ccd6}
  .slot.locked:hover{border-color:#cfd9e2;background:#f2f5f9;color:#c2ccd6}
  .slot .ico{width:28px;height:28px;display:block;pointer-events:none}
  .slot .dot{position:absolute;bottom:3px;right:4px;width:5px;height:5px;border-radius:50%;
    background:#a8482f}
  /* toast for load feedback */
  #note{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(6px);
    max-width:min(80vw,520px);text-align:center;background:#ffffffee;border:1px solid #b9c7d4;
    border-radius:6px;padding:8px 14px;font-size:12px;line-height:1.4;white-space:pre-wrap;
    color:#3a4d61;box-shadow:0 4px 20px #0003;opacity:0;pointer-events:none;z-index:4;
    transition:opacity .2s,transform .2s}
  #note.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #note.warn{color:#a8482f;border-color:#e0b6ab}
  #note.ok{color:#3c7a3c;border-color:#b6d3b6}
  #msg{position:fixed;inset:0;display:none;place-items:center;pointer-events:none}
  #msg div{font-size:34px;letter-spacing:.22em;color:#fff;text-shadow:0 2px 24px #000a;
    max-width:92vw;text-align:center;line-height:1.3}
  #msg .sub{display:block;font-size:15px;letter-spacing:.08em;margin-top:10px}
  #tip{position:fixed;top:14px;left:14px;color:#22303c;text-shadow:0 1px 0 #fff6;
    font-size:12px;max-width:calc(100vw - 28px);z-index:3}
  #tip b{color:#0f1721}
  #tip .k{display:inline-block;background:#ffffffbb;border:1px solid #c6d2dc;border-radius:3px;
    padding:0 4px;margin:0 1px;color:#2f6fb0;font-weight:600}
  #drop{position:fixed;inset:0;display:none;place-items:center;background:#2f6fb033;
    border:3px dashed #2f6fb0;pointer-events:none;z-index:5}
  #drop div{font-size:22px;letter-spacing:.1em;color:#1c3550;background:#ffffffcc;
    padding:14px 22px;border-radius:8px}

<script type="module">
import * as THREE from 'three';
import initJolt from 'jolt-physics/wasm-compat';
import { makeTower, makeMortar, Castle, LAYER_STATIC, LAYER_MOVING, NUM_LAYERS } from './castle.mjs';
import { PLANS } from './plans.mjs';
import { buildPlan, validatePlan } from './buildplan.mjs';

const Jolt = await initJolt();
const V  = (x,y,z) => new Jolt.Vec3(x,y,z);
const RV = (x,y,z) => new Jolt.RVec3(x,y,z);
const QI = () => Jolt.Quat.prototype.sIdentity();

/* ---------------- ammunition ---------------------------------------- */
const AMMO = {
  solid:  { name:'solid shot', note:'small, precise. chips one spot.', key:'q',
            calibre:0.22, mass:180, speed:120, crater:0.40, blastR:0.85, power:1.5, impulse:400 },
  shell:  { name:'explosive shell', note:'the workhorse. widen a breach at the base.', key:'w',
            calibre:0.30, mass:150, speed:95,  crater:0.70, blastR:1.40, power:20.2, impulse:8000 },
  pene:   { name:'penetrator', note:'narrow, deep. goes off INSIDE the wall. the round that reaches a magazine.', key:'e',
            calibre:0.16, mass:220, speed:150, crater:0.50, blastR:1.05, power:2.6, impulse:500,
            penetration:1.4 },
  mortar: { name:'mortar', note:'lobs OVER a curtain wall and comes down steep. slow.', key:'a',
            calibre:0.34, mass:170, speed:26,  crater:0.75, blastR:1.55, power:2.3, impulse:900,
            arc:'high' },
};
let selected = 'shell', rounds = 20;
const CRUSH = 2.2;          // overload the stone tolerates before it pulverises

/* ---------------- the roster ----------------------------------------
   Built-in plans come from PLANS. Loaded plans (dropped, opened, or handed
   over from the editor) are kept alongside them so they appear as castle
   buttons and rebuild on R just like the rest. */
const custom = {};                       // name -> plan JSON
let active = { kind:'builtin', key:'round' };
function roster() {
  const out = Object.entries(PLANS).map(([id,P]) => ({ id, name:P.name, blurb:P.blurb, kind:'builtin' }));
  for (const name of Object.keys(custom))
    out.push({ id:name, name, blurb:custom[name]._blurb || 'loaded plan', kind:'custom' });
  return out;
}

/* a castle built in the plan editor, baked in so it's always in the roster

    { "type": "tower", "id": "tower4", "shape": "square", "cx": 5, "cz": 15, "side": 5, "crenels": true,

    { "type": "wall", "path": [[-5, 12.5], [-5, 15], [2.5, 15]], "closed": false, "crenels": true,

    { "type": "wall", "path": [[5, 12.5], [5, -12.5]], "closed": false, "crenels": true,

    { "type": "wall", "path": [[2.5, -15], [-5, -15], [-5, -12.5]], "closed": false, "crenels": true,
      "openings": [], "courses": 12 },
    { "type": "wall", "path": [[-2.5, -10], [0, -10], [0, -2.5]], "closed": false, "crenels": true,
      "openings": [], "courses": 12 },
    { "type": "wall", "path": [[-2.5, 10], [0, 10], [0, 2.5]], "closed": false, "crenels": true,

    { "type": "banner", "on": "tower3" },
    { "type": "keg", "x": -6.5, "z": -8.5,  "y": 0.45, "spec": {} },

    { "type": "tower", "id": "tower3", "shape": "square", "cx": 5, "cz": -10, "side": 5, "crenels": true,

    { "type": "wall", "path": [[0, -5.5], [0, -10], [2.5, -10]], "closed": false, "crenels": true, "openings": [] },
    { "type": "wall", "path": [[0, 5.5], [0, 10], [2.5, 10]], "closed": false, "crenels": true, "openings": [] },
    { "type": "wall", "path": [[7.5, -10], [12.5, -10], [12.5, 10], [7.5, 10]], "closed": false, "crenels": true, "openings": [] },
    { "type": "banner", "on": "tower2" },
    { "type": "magazine", "x": 4, "z": 10, "y": 0.45, "n": 4, "spread": 0.9,
      "spec": { "blastR": 3, "power": 2.2, "crater": 1.8, "impulse": 30000 } },
    { "type": "magazine", "x": 5, "z": 10, "y": 0.45, "n": 4, "spread": 0.9,
      "spec": { "blastR": 3, "power": 2.2, "crater": 1.8, "impulse": 30000 } },
    { "type": "magazine", "x": 6, "z": 10, "y": 0.45, "n": 4, "spread": 0.9,
      "spec": { "blastR": 3, "power": 2.2, "crater": 1.8, "impulse": 30000 } },
    { "type": "tower", "id": "tower1", "shape": "square", "cx": -10, "cz": 0, "side": 5, "crenels": true,
      "openings": [] },
    { "type": "wall", "path": [[-10, -2.5], [-10, -5], [0, -5], [0, -2.5]], "closed": false, "crenels": true, "openings": [] },
    { "type": "wall", "path": [[-10, 2.5], [-10, 5], [0, 5], [0, 2.5]], "closed": false, "crenels": true, "openings": [] }
  ]
};

/* ---------------- physics world ------------------------------------- */
function makeWorld() {
  const of = new Jolt.ObjectLayerPairFilterTable(NUM_LAYERS);
  of.EnableCollision(LAYER_STATIC, LAYER_MOVING);
  of.EnableCollision(LAYER_MOVING, LAYER_MOVING);
  const bp = new Jolt.BroadPhaseLayerInterfaceTable(NUM_LAYERS, 2);
  bp.MapObjectToBroadPhaseLayer(LAYER_STATIC, new Jolt.BroadPhaseLayer(0));
  bp.MapObjectToBroadPhaseLayer(LAYER_MOVING,  new Jolt.BroadPhaseLayer(1));
  const s = new Jolt.JoltSettings();
  s.mObjectLayerPairFilter = of;
  s.mBroadPhaseLayerInterface = bp;
  s.mObjectVsBroadPhaseLayerFilter =
    new Jolt.ObjectVsBroadPhaseLayerFilterTable(s.mBroadPhaseLayerInterface, 2, s.mObjectLayerPairFilter, NUM_LAYERS);
  const j = new Jolt.JoltInterface(s);
  Jolt.destroy(s);
  const bi = j.GetPhysicsSystem().GetBodyInterface();
  const fs = new Jolt.BoxShape(V(90, 0.5, 90), 0.05, null);
  const cfg = new Jolt.BodyCreationSettings(fs, RV(0,-0.5,0), QI(), Jolt.EMotionType_Static, LAYER_STATIC);
  cfg.mFriction = 0.9;
  const f = bi.CreateBody(cfg);
  bi.AddBody(f.GetID(), Jolt.EActivation_DontActivate);
  Jolt.destroy(cfg);
  return j;
}

/* ---------------- render -------------------------------------------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8fc3e8);
scene.fog = new THREE.Fog(0xbcd9ef, 70, 200);

const cam = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 600);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xbcd9ef, 0x6a6a4a, 1.05));
const sun = new THREE.DirectionalLight(0xfff2d8, 2.4);
sun.position.set(-26, 42, 18);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const sc = sun.shadow.camera;
sc.left = -34; sc.right = 34; sc.top = 42; sc.bottom = -8; sc.far = 120;
scene.add(sun);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(90, 64).rotateX(-Math.PI/2),
  new THREE.MeshStandardMaterial({ color:0x6f8250, roughness:1 }));
ground.receiveShadow = true;
scene.add(ground);
const grid = new THREE.GridHelper(90, 45, 0x7b8f5c, 0x66794a);
grid.material.transparent = true; grid.material.opacity = 0.35;
scene.add(grid);

const gun = new THREE.Group();
const barrel = new THREE.Mesh(
  new THREE.CylinderGeometry(0.22, 0.30, 2.6, 16).rotateZ(Math.PI/2),
  new THREE.MeshStandardMaterial({ color:0x30363d, metalness:0.85, roughness:0.35 }));
barrel.castShadow = true;
gun.add(barrel);
gun.position.set(-30, 0.9, 0);
scene.add(gun);
const MUZZLE = new THREE.Vector3(-28.7, 1.0, 0);

/* Stone is one instanced box mesh. Kegs get a SECOND instanced mesh of
   cylinders: "there is powder in there" has to read at a glance, because it is
   the whole reason to aim at the middle of a castle instead of its base. */
const stoneMat = new THREE.MeshStandardMaterial({ color:0xb0a894, roughness:0.9, metalness:0.02 });
const kegMat   = new THREE.MeshStandardMaterial({ color:0x6b3f22, roughness:0.75, emissive:0x160700 });
const dummy = new THREE.Object3D();

let jolt, castle, bricks, links, mesh, kegMesh, kegIdx = [], xf;
let won = false, lost = false, settle = 0;
let roundToken = 0, advanceTimer = null;   // guards the auto-advance timeout against a manual reload in between
const shots = [];

/* tear the current world and its meshes down */
function teardown() {
  if (!jolt) return;
  scene.remove(mesh); mesh.dispose();
  if (kegMesh) { scene.remove(kegMesh); kegMesh.dispose(); kegMesh = null; }
  for (const s of shots) scene.remove(s.mesh);
  shots.length = 0;
  for (const p of puffs) scene.remove(p.m);
  puffs.length = 0;
  Jolt.destroy(jolt);
}

/* stand a brick array up in a fresh world and wire the meshes.
   build() (built-in) and loadPlan() (JSON) both funnel through here, so a
   loaded castle behaves exactly like a shipped one. */
function instantiate(bricksIn, cameraDist) {
  teardown();
  jolt   = makeWorld();
  bricks = bricksIn;
  links  = makeMortar(bricks);
  castle = new Castle(Jolt, jolt, bricks, links);
  castle.installImpactFracture(6.0, 1.6, 2.4);
  castle.crushFactor = CRUSH;
  castle.maxBodies   = 600;    // fragment budget: past this, rubble stops sub-dividing
  castle.rebuild();            // also calibrates what the intact structure carries

  mesh = new THREE.InstancedMesh(new THREE.BoxGeometry(1,1,1), stoneMat, bricks.length);
  mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  mesh.castShadow = mesh.receiveShadow = true;
  mesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(bricks.length*3), 3);
  const col = new THREE.Color();
  for (let i = 0; i < bricks.length; i++) {
    const b = bricks[i];
    if (b.isBanner) col.set(b.pole ? 0x8a7a5c : 0xb3402f);
    else col.setHSL(0.10, 0.13, 0.56 + ((i*2654435761)%1000)/1000*0.16);   // stable per-brick jitter
    mesh.setColorAt(i, col);
  }
  mesh.instanceColor.needsUpdate = true;
  scene.add(mesh);

  kegIdx = bricks.map((b,i) => b.isKeg ? i : -1).filter(i => i >= 0);
  if (kegIdx.length) {
    kegMesh = new THREE.InstancedMesh(
      new THREE.CylinderGeometry(0.34, 0.34, 0.84, 12), kegMat, kegIdx.length);
    kegMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    kegMesh.castShadow = kegMesh.receiveShadow = true;
    scene.add(kegMesh);
  }

  xf = new Float32Array(bricks.length * 7);
  rounds = 20;
  won = false; lost = false; settle = 0;
  roundToken++;
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  dist = cameraDist;
  hideMsg();
  sync();
  updateHud();
}

/* start a built-in plan */
function build(which) {
  active = { kind:'builtin', key:which };
  instantiate(PLANS[which].make(makeTower), PLANS[which].camera);
}

/* start a loaded JSON plan. Validates first and reports, but still stands it
   up even when flawed -- seeing a floating banner in 3D is the fastest way to
   understand the warning. */
function loadPlan(plan, { register = true } = {}) {
  let brickArr;
  try { brickArr = buildPlan(plan); }
  catch (e) { note('could not build plan: ' + e.message, 'warn'); return; }
  const v = validatePlan(brickArr);
  const name = plan.name || 'loaded plan';
  if (register) custom[name] = plan;
  active = { kind:'custom', name };
  instantiate(brickArr, plan.camera || 40);
  setMode('castle');                              // show the loaded castle, highlighted
  if (v.ok) note(`${name}: ${v.stats.bricks} bricks, ${v.stats.kegs} kegs. ready.`, 'ok');
  else note(`${name} loaded with issues:\n- ` + v.issues.join('\n- '), 'warn');
}

/* R: rebuild whatever is active */
function reload() {
  if (active.kind === 'builtin') build(active.key);
  else loadPlan(custom[active.name], { register:false });
}

/* find `active` in roster() -- same identity test drawGrid() uses to light up a slot */
function currentRosterIndex(list) {
  return list.findIndex(e =>
    (active.kind === 'builtin' && e.kind === 'builtin' && e.id === active.key) ||
    (active.kind === 'custom'  && e.kind === 'custom'  && e.name === active.name));
}

/* start the next castle in the roster; loop back to the top once the series is cleared */
function advanceToNextCastle() {
  const list = roster();
  const i = currentRosterIndex(list);
  const next = list[(i < 0 ? -1 : i) + 1] || list[0];
  next.kind === 'builtin' ? build(next.id) : loadPlan(custom[next.name], { register:false });
  setMode('castle');
  return next;
}

/* a round just ended: won -> the next castle in the series, lost -> the same one again.
   Pauses on the result message first so the outcome reads before the castle changes. */
function onRoundEnd(didWin) {
  const token = roundToken;
  if (didWin) {
    const list = roster();
    const i = currentRosterIndex(list);
    const next = list[(i < 0 ? -1 : i) + 1];
    showMsg('BANNER DOWN', next ? `next: ${next.name}` : 'series complete — starting over');
  } else {
    showMsg('OUT OF ROUNDS', 'retrying this castle');
  }
  advanceTimer = setTimeout(() => {
    advanceTimer = null;
    if (token !== roundToken) return;      // player already moved on manually -- don't also jump
    didWin ? advanceToNextCastle() : reload();
  }, 2200);
}

/* ---------------- projectiles ---------------------------------------- */
const ballGeo = new THREE.SphereGeometry(1, 14, 10);
const ballMat = new THREE.MeshStandardMaterial({ color:0x23282e, metalness:0.9, roughness:0.3 });

/* Two launch angles reach any point in range: the flat one (a gun) and the
   lobbed one (a mortar). Once a castle has curtain walls the player MUST have
   the second, or everything behind the wall is simply unreachable. */
function ballistic(from, to, speed, high) {
  const dx = to.x - from.x, dy = to.y - from.y, dz = to.z - from.z;
  const d = Math.hypot(dx, dz), g = 9.81;
  const disc = speed**4 - g * (g*d*d + 2*dy*speed*speed);
  if (disc < 0) {                                  // out of range: aim straight at it
    const L = Math.hypot(dx, dy, dz);
    return [dx/L, dy/L, dz/L];
  }
  const root = Math.sqrt(disc);
  const ang = Math.atan2(speed*speed + (high ? root : -root), g*d);
  const hx = dx/d, hz = dz/d;
  return [hx*Math.cos(ang), Math.sin(ang), hz*Math.cos(ang)];
}

function fire(target) {
  if (rounds <= 0 || won) return;
  const A = AMMO[selected];
  const dir = ballistic(MUZZLE, target, A.speed, A.arc === 'high');
  const body = castle.fire([MUZZLE.x, MUZZLE.y, MUZZLE.z], dir, A);
  const m = new THREE.Mesh(ballGeo, ballMat);
  m.scale.setScalar(A.calibre);
  m.castShadow = true;
  scene.add(m);
  shots.push({ body, mesh:m });
  rounds--;
  gun.lookAt(target.x, MUZZLE.y, target.z);
  gun.rotateY(Math.PI/2);
  puff(MUZZLE.x, MUZZLE.y, MUZZLE.z, 0.45, 0xdfe6ec, 0.4, 3);
  sfxCannon();
  updateHud();
}

/* ---------------- puffs and fireballs -------------------------------- */
const puffs = [];
function puff(x, y, z, r, color = 0xffb46b, life = 0.45, grow = 4) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 8),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.55, depthWrite:false }));
  m.position.set(x, y, z);
  scene.add(m);
  puffs.push({ m, t:0, life, grow });
}

/* a keg going up is not a puff: fireball, smoke and a flash of light. */
const flash = new THREE.PointLight(0xffb04a, 0, 45, 2);
scene.add(flash);
let flashT = 0;
function fireball(x, y, z, r) {
  puff(x, y, z, r * 0.55, 0xffd27a, 0.9, 3.2);
  puff(x, y, z, r * 0.32, 0xff6a1e, 1.2, 5.0);
  puff(x, y + r * 0.4, z, r * 0.24, 0x40403c, 1.8, 6.0);   // smoke
  flash.position.set(x, y + 1, z);
  flashT = 0.25;
}

/* ---------------- sound: procedural, no audio files -----------------
   A tiny Web Audio synth. Booms are a pitch-dropping sine sub plus a
   low-passed noise body; knocks are a short band-passed noise click.
   Nothing is loaded -- it's all generated, so it works offline. Browsers
   only allow audio after a user gesture, so the context is created on the
   first click or key and resumed if the tab suspended it. */
let actx = null, master = null, noiseBuf = null, muted = false;
function audioInit() {
  if (actx) { if (actx.state === 'suspended') actx.resume(); return; }
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  actx = new AC();
  if (actx.state === 'suspended') actx.resume();   // iOS Safari can start suspended even inside a gesture
  master = actx.createGain(); master.gain.value = muted ? 0 : 0.85;
  master.connect(actx.destination);
  const n = actx.sampleRate * 0.8;
  noiseBuf = actx.createBuffer(1, n, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  // nudge the hardware audio pipeline awake now, synchronously in the gesture --
  // iOS Safari has been known to silently drop the first real sound otherwise
  const unlock = actx.createBufferSource();
  unlock.buffer = actx.createBuffer(1, 1, actx.sampleRate);
  unlock.connect(actx.destination);
  unlock.start(0);
}
addEventListener('pointerdown', audioInit);
addEventListener('touchend', audioInit);
addEventListener('keydown', audioInit);

function noiseSrc() { const s = actx.createBufferSource(); s.buffer = noiseBuf; s.loop = true; return s; }

/* a low boom: sub-sine + lowpassed noise, both enveloped down over `dur` */
function boom(level, dur, f0, f1, lp0, lp1) {
  if (!actx || muted) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(f1, t + dur * 0.9);
  const og = actx.createGain();
  og.gain.setValueAtTime(level, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(og).connect(master); o.start(t); o.stop(t + dur);

  const s = noiseSrc();
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(lp0, t);
  lp.frequency.exponentialRampToValueAtTime(lp1, t + dur);
  const ng = actx.createGain();
  ng.gain.setValueAtTime(level * 0.85, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + dur);
  s.connect(lp).connect(ng).connect(master); s.start(t); s.stop(t + dur);
}

/* a short knock: band-passed noise click, pitch jittered so repeats don't phase */
function knock(level) {
  if (!actx || muted) return;
  const t = actx.currentTime;
  const s = noiseSrc();
  const bp = actx.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = 240 + Math.random() * 520; bp.Q.value = 1.1;
  const g = actx.createGain();
  g.gain.setValueAtTime(level, t);
  g.gain.exponentialRampToValueAtTime(0.0006, t + 0.06);
  s.connect(bp).connect(g).connect(master); s.start(t); s.stop(t + 0.08);
}

const sfxCannon = () => boom(0.55, 0.34, 150, 46, 1700, 220);
const sfxKeg = r => boom(Math.min(0.95, 0.45 + r * 0.12), Math.min(0.85, 0.42 + r * 0.09),
                         95, 26, 1300, 80);

/* collapse rattle: the impact-fracture list holds this step's hard landings.
   Play at most one knock per ~35 ms, scaled by the loudest hit, or a whole
   tower coming down is an unlistenable roar. Read it BEFORE applyImpacts()
   clears it. */
let lastKnock = 0;
function sfxImpacts() {
  const imps = castle && castle.impacts;
  if (!imps || !imps.length) return;
  const now = performance.now();
  if (now - lastKnock < 35) return;
  let pw = 0; for (const im of imps) if (im.power > pw) pw = im.power;
  lastKnock = now;
  knock(Math.min(0.32, 0.07 + pw * 0.05));
}
function setMuted(v) {
  muted = v;
  if (master) master.gain.value = v ? 0 : 0.85;
  if (sndbtn) { sndbtn.classList.toggle('off', v); sndbtn.title = v ? 'Sound off (S)' : 'Sound on (S)'; }
}

/* ---------------- meshes follow the physics ------------------------- */
function sync() {
  castle.brickTransforms(xf);
  for (let i = 0; i < bricks.length; i++) {
    if (!castle.alive[i] || bricks[i].isKeg) {          // destroyed, or drawn as a barrel
      dummy.scale.set(0,0,0); dummy.position.set(0,-99,0);
      dummy.updateMatrix(); mesh.setMatrixAt(i, dummy.matrix);
      continue;
    }
    const h = bricks[i].h;
    dummy.position.set(xf[i*7], xf[i*7+1], xf[i*7+2]);
    dummy.quaternion.set(xf[i*7+3], xf[i*7+4], xf[i*7+5], xf[i*7+6]);
    dummy.scale.set(h[0]*2, h[1]*2, h[2]*2);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  mesh.instanceMatrix.needsUpdate = true;

  if (kegMesh) {
    for (let k = 0; k < kegIdx.length; k++) {
      const i = kegIdx[k];
      if (!castle.alive[i]) { dummy.scale.set(0,0,0); dummy.position.set(0,-99,0); }
      else {
        dummy.position.set(xf[i*7], xf[i*7+1], xf[i*7+2]);
        dummy.quaternion.set(xf[i*7+3], xf[i*7+4], xf[i*7+5], xf[i*7+6]);
        dummy.scale.set(1,1,1);
      }
      dummy.updateMatrix();
      kegMesh.setMatrixAt(k, dummy.matrix);
    }
    kegMesh.instanceMatrix.needsUpdate = true;
  }
}

/* ---------------- camera + click/tap to fire -------------------------
   One pointer-event system covers mouse, touch and pen: a single pointer
   drags to orbit, two fingers pinch to zoom (there's no wheel on a phone),
   and a quick tap/click that didn't drag fires at whatever it lands on. */
const inUI = e => e.target.closest('#dock,#tip,#note,#msg,#drop');   // clicks here never fire or orbit
let yaw = -Math.PI/2, pitch = 0.22, dist = 34;                       // start behind the gun, looking down the barrel
const ray = new THREE.Raycaster();

const pointers = new Map();              // active pointers: id -> {x,y}
let dragId = null, dragMoved = false, downAt = 0, downX = 0, downY = 0;
let pinchStart = null;                   // {d: starting finger distance, dist: starting camera dist}

addEventListener('pointerdown', e => {
  if (inUI(e)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 1) {
    dragId = e.pointerId; dragMoved = false;
    downAt = performance.now(); downX = e.clientX; downY = e.clientY;
  } else if (pointers.size === 2) {
    dragId = null;                                          // second finger down: pinch, not orbit/tap
    const [a, b] = [...pointers.values()];
    pinchStart = { d: Math.hypot(a.x - b.x, a.y - b.y), dist };
  }
});
addEventListener('pointermove', e => {
  if (!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size === 2 && pinchStart) {
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y);
    dist = Math.max(12, Math.min(95, pinchStart.dist * (pinchStart.d / Math.max(1, d))));
    return;
  }
  if (e.pointerId !== dragId) return;
  if (!dragMoved && Math.hypot(e.clientX - downX, e.clientY - downY) > 6) dragMoved = true;
  yaw   -= (e.clientX - prev.x) * 0.005;
  pitch  = Math.max(-0.12, Math.min(1.2, pitch + (e.clientY - prev.y) * 0.004));
});
function releasePointer(e) {
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinchStart = null;
  if (pointers.size === 1 && dragId === null) {             // pinch ended: hand orbit to the remaining finger
    const [[id]] = pointers;
    dragId = id; dragMoved = true; downAt = 0;
  }
  if (e.pointerId !== dragId) return;
  dragId = null;
  if (inUI(e)) return;
  if (dragMoved || performance.now() - downAt > 220) return; // that was a drag/pinch, not a tap
  const nd = new THREE.Vector2((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(nd, cam);
  const hit = ray.intersectObject(mesh, false)[0]
           || (kegMesh ? ray.intersectObject(kegMesh, false)[0] : null)
           || ray.intersectObject(ground, false)[0];
  if (hit) fire(hit.point);
}
addEventListener('pointerup', releasePointer);
addEventListener('pointercancel', e => { pointers.delete(e.pointerId); if (e.pointerId === dragId) dragId = null; pinchStart = null; });
addEventListener('wheel', e => { dist = Math.max(12, Math.min(95, dist + e.deltaY*0.03)); }, {passive:true});
/* Keys: M minimizes, S toggles sound, R rebuilds the active castle, L loads a plan. */
addEventListener('keydown', e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key.toLowerCase();
  if (k === 'm') setMinimized(!minimized);
  else if (k === 's') setMuted(!muted);
  else if (k === 'r') reload();
  else if (k === 'l') file.click();
});

/* ---------------- load: drag-drop, file, editor hand-off ------------- */
const dropEl = document.getElementById('drop');
addEventListener('dragover', e => { e.preventDefault(); dropEl.style.display = 'grid'; });
addEventListener('dragleave', e => { if (e.clientX === 0 && e.clientY === 0) dropEl.style.display = 'none'; });
addEventListener('drop', async e => {
  e.preventDefault(); dropEl.style.display = 'none';
  const f = e.dataTransfer.files[0];
  if (!f) return;
  try { loadPlan(JSON.parse(await f.text())); }
  catch (err) { note('that file is not a plan: ' + err.message, 'warn'); }
});
const file = document.getElementById('file');
document.getElementById('loadbtn').onclick = () => file.click();
file.onchange = async () => {
  const f = file.files[0]; if (!f) return;
  try { loadPlan(JSON.parse(await f.text())); }
  catch (err) { note('that file is not a plan: ' + err.message, 'warn'); }
  file.value = '';
};

/* the editor opens the viewer with a plan waiting in this slot */
function pickupHandoff() {
  let raw = null;
  try { raw = localStorage.getItem('siege.pendingPlan'); localStorage.removeItem('siege.pendingPlan'); } catch {}
  if (!raw) return false;
  try { loadPlan(JSON.parse(raw)); return true; } catch { return false; }
}

function placeDockAt(left, top) {
  const w = dock.offsetWidth, h = dock.offsetHeight;
  left = Math.max(6, Math.min(innerWidth  - w - 6, left));
  top  = Math.max(6, Math.min(innerHeight - h - 6, top));
  dock.style.left = left + 'px'; dock.style.top = top + 'px';
  dock.style.right = 'auto'; dock.style.bottom = 'auto'; dock.style.transform = 'none';
  dockMoved = true;
}

  minbtn.innerHTML = v ? '&#9633;' : '&minus;';                 // □ to expand, − to minimize
  minbtn.title = v ? 'Expand (M)' : 'Minimize (M)';
  if (dockMoved) { const r = dock.getBoundingClientRect(); placeDockAt(r.left, r.top); }
}
minbtn.onclick = () => setMinimized(!minimized);
sndbtn.onclick = () => { audioInit(); setMuted(!muted); };

/* drag the whole bar; a tap (no drag) on the minimized pill re-opens it.
   Buttons inside the bar keep their own clicks -- we only drag from the chrome. */
let ddrag = null;
dockbar.addEventListener('pointerdown', e => {
  if (e.target.closest('button')) return;
  const r = dock.getBoundingClientRect();
  ddrag = { sx: e.clientX, sy: e.clientY, ox: r.left, oy: r.top, moved: false };
  dockbar.setPointerCapture(e.pointerId);
});
dockbar.addEventListener('pointermove', e => {
  if (!ddrag) return;
  const dx = e.clientX - ddrag.sx, dy = e.clientY - ddrag.sy;
  if (!ddrag.moved && Math.hypot(dx, dy) < 4) return;           // ignore tiny jitters
  ddrag.moved = true;
  placeDockAt(ddrag.ox + dx, ddrag.oy + dy);
});
dockbar.addEventListener('pointerup', e => {
  if (!ddrag) return;
  const moved = ddrag.moved; ddrag = null;
  if (!moved && minimized) setMinimized(false);                 // tap pill to reopen
});

/* ---------------- icons ----------------------------------------------
   Hand-drawn line-art of the things themselves: towers, a keep, a castle,
   and the four rounds. Inline SVG so they stay crisp, theme to currentColor
   (so selected/locked states just work), and need no external assets. */
const svg = d => `<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" ` +
  `stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;

/* crenellated outline between x0..x1, top yT, base yB, with `m` merlons */
function battlement(x0, x1, yT, yB, m) {
  const units = m * 2 - 1, w = (x1 - x0) / units;
  const dip = Math.min(1.8, (yB - yT) * 0.16 + 1.1);
  let d = `M${x0} ${yB} V${yT}`, up = true;
  for (let i = 0; i < units; i++) {
    d += ` h${w.toFixed(2)}`;
    if (i < units - 1) { d += ` v${(up ? dip : -dip).toFixed(2)}`; up = !up; }
  }
  return d + ` V${yB} Z`;
}

seg.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (btn) setMode(btn.dataset.mode);
});

function drawGrid() {
  gridEl.innerHTML = '';
  if (dockMode === 'castle') {
    const list = roster();                   // built-ins, then loaded plans, then locked
    for (let s = 0; s < GRID_SLOTS; s++) {
      const e = list[s];
      if (!e) {
        const b = slotEl(' locked', ICON.locked);
        b.title = 'Empty castle slot';
        b.onclick = () => toast('No castle in that slot yet.');
        gridEl.appendChild(b); continue;
      }
      const on = (active.kind === 'builtin' && active.key === e.id) ||
                 (active.kind === 'custom'  && active.name === e.name);
      const b = slotEl(on ? ' on' : '', castleIcon(e),
                       e.kind === 'custom' ? '<span class="dot"></span>' : '');
      b.title = `${e.name}${e.blurb ? ' — ' + e.blurb : ''}`;
      b.onclick = () => selectCastleSlot(s);
      gridEl.appendChild(b);
    }
  } else {
    const ids = Object.keys(AMMO);           // built weapons, then locked slots
    for (let s = 0; s < GRID_SLOTS; s++) {
      const id = ids[s], A = id ? AMMO[id] : null;
      if (!A) {
        const b = slotEl(' locked', ICON.locked);
        b.title = 'Weapon slot — not built yet';
        b.onclick = () => toast('That weapon isn\'t built yet.');
        gridEl.appendChild(b); continue;
      }
      const b = slotEl(id === selected ? ' on' : '', ICON[id] || ICON.locked);
      b.title = `${A.name}${A.note ? ' — ' + A.note : ''}`;
      b.onclick = () => selectWeaponSlot(s);
      gridEl.appendChild(b);
    }
  }
}

function selectCastleSlot(s) {
  const e = roster()[s];
  if (!e) { toast('No castle in that slot yet.'); return; }
  e.kind === 'builtin' ? build(e.id) : loadPlan(custom[e.name], { register:false });
  setMode('castle');
}
function selectWeaponSlot(s) {
  const id = Object.keys(AMMO)[s];
  if (!id) { toast('That weapon slot is empty.'); return; }
  pick(id);
}
function pick(id) { selected = id; setMode('weapon'); }

function updateHud() {
  $('rounds').textContent = rounds;
  $('roundsWrap').classList.toggle('low', rounds <= 3);
}
function showMsg(t, sub) {
  const el = $('msgtext');
  el.textContent = t;
  if (sub) {
    const s = document.createElement('span');
    s.className = 'sub';
    s.textContent = sub;
    el.appendChild(s);
  }
  $('msg').style.display = 'grid';
}
function hideMsg()  { $('msg').style.display = 'none'; }

/* ---------------- loop ------------------------------------------------ */
if (!pickupHandoff()) build('round');
setMode('castle');

const DT = 1/60;
let last = performance.now(), acc = 0, fps = 60;

function frame() {
  requestAnimationFrame(frame);
  const now = performance.now();
  const dt = Math.min(0.05, (now - last)/1000);
  last = now;
  fps += ((1/Math.max(dt,1e-3)) - fps) * 0.08;

  acc += dt;
  let steps = 0;
  while (acc >= DT && steps++ < 3) {       // the frame a magazine goes up is expensive: never spiral
    jolt.Step(DT, 1);
    sfxImpacts();                          // read the hard landings before applyImpacts clears them
    castle.applyImpacts();

    for (const h of castle.applyHits()) {
      puff(h.at[0], h.at[1], h.at[2], h.ammo.blastR * 0.5);
      const s = shots.find(s => s.body.GetID().GetIndexAndSequenceNumber() === h.id);
      if (s) { scene.remove(s.mesh); castle.bi.RemoveBody(s.body.GetID());
               castle.bi.DestroyBody(s.body.GetID()); shots.splice(shots.indexOf(s),1); }
    }
    for (const b of castle.drainBooms()) { fireball(b.at[0], b.at[1], b.at[2], b.r); sfxKeg(b.r); }
    acc -= DT;
  }
  if (acc > DT) acc = DT;

  for (const s of shots) {
    const p = s.body.GetPosition();
    s.mesh.position.set(p.GetX(), p.GetY(), p.GetZ());
  }
  for (let i = puffs.length-1; i >= 0; i--) {
    const p = puffs[i];
    p.t += dt;
    p.m.scale.setScalar(1 + p.t * p.grow);
    p.m.material.opacity = Math.max(0, 0.55 * (1 - p.t / p.life));
    if (p.t > p.life) { scene.remove(p.m); puffs.splice(i,1); }
  }
  if (flashT > 0) { flashT -= dt; flash.intensity = Math.max(0, flashT * 900); }

  sync();
  updateHud();

  if (!won && !lost && castle.bannerDown()) {
    settle += dt;
    if (settle > 0.8) { won = true; onRoundEnd(true); }
  } else if (!won && !lost && rounds === 0 && shots.length === 0 && castle.awake() === 0) {
    lost = true; onRoundEnd(false);
  }

  const cy = Math.cos(pitch);
  cam.position.set(Math.sin(yaw)*cy*dist, Math.sin(pitch)*dist + 7, Math.cos(yaw)*cy*dist);
  cam.lookAt(0, 6, 0);
  renderer.render(scene, cam);
}
frame();

addEventListener('resize', () => {
  cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (dockMoved) { const r = dock.getBoundingClientRect(); placeDockAt(r.left, r.top); }
});
</script>
