<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Castle</title>
<style>
  :root{
    --sky1:#7fb8e6; --sky2:#f4dfa8;
    --ink:#2a2118; --ink2:#6b5c47;
    --card:#fffaf0; --card-line:#e2d2ad;
    --accent:#b5502f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;color:var(--ink);
    font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  body{
    background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 62%,#d9c48a 100%);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:8vh 20px 40px;
  }
  header{text-align:center;margin-bottom:6vh}
  h1{margin:0;font-size:clamp(40px,7vw,64px);letter-spacing:.02em;
    color:#fff;text-shadow:0 3px 0 #0003,0 8px 24px #0004}
  .tagline{margin:10px 0 0;font-size:clamp(15px,2.2vw,20px);color:#fffdf6;
    text-shadow:0 2px 8px #0003;font-weight:600}

  .tiles{width:100%;max-width:700px;display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
  @media (max-width:560px){ .tiles{grid-template-columns:1fr} }

  .tile{background:var(--card);border:1px solid var(--card-line);border-radius:18px;
    padding:32px 22px 28px;text-align:center;cursor:pointer;text-decoration:none;color:inherit;
    display:flex;flex-direction:column;align-items:center;gap:12px;
    box-shadow:0 10px 0 #0000000f,0 14px 30px #00000022;
    transition:transform .12s ease,box-shadow .12s ease;}
  .tile:hover{transform:translateY(-4px);box-shadow:0 14px 0 #0000000f,0 20px 36px #00000030}
  .tile:active{transform:translateY(-1px)}
  .tile .icon{width:84px;height:84px}
  .tile h2{margin:4px 0 0;font-size:24px}
  .tile p{margin:0;color:var(--ink2);font-size:15px}
</style>

<header>
  <h1>Castle</h1>
  <p class="tagline">Build a castle. Then destroy it.</p>
</header>

<div class="tiles">
  <a class="tile" href="viewer.html">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)">
      <path d="M4 21V10l2-2V6h2v2l1-1V5h2v2l1-1V4h2v2l1 1V5h2v2l2 2v11 2 0"/>
      <path d="M4 21h16" stroke-width="1.8"/>
      <path d="M8 21v-6h3v6M13 21v-6h3v6" stroke-width="1.4"/>
    </svg>
    <h2>Play a Castle</h2>
    <p>Lay siege and bring the banner down.</p>
  </a>

  <a class="tile" href="editor.html">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="color:#3c7a3c">
      <path d="M3 21l3.6-1 11-11a1.6 1.6 0 0 0 0-2.3l-1.3-1.3a1.6 1.6 0 0 0-2.3 0l-11 11L2 20z"/>
      <path d="M13.5 6.5l3 3"/>
    </svg>
    <h2>Build a Castle</h2>
    <p>Design your own in the castle editor.</p>
  </a>
</div>
