<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>siege · plan editor</title>
<style>
  :root{
    --ink:#1c2530; --ink2:#5b6b7c; --line:#c6d2dc; --line2:#d5dee6;
    --panel:#ffffff; --field:#eef3f8; --accent:#2f6fb0; --accent-bg:#cfe4f7;
    --stone:#b0a894; --powder:#a8482f; --ok:#3c7a3c; --grid:#dbe4ec;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
    color:var(--ink);background:#e7eef4;overflow:hidden}
  button,input,select{font:inherit;color:var(--ink)}
  .app{display:grid;grid-template-columns:58px 1fr 260px;grid-template-rows:46px 1fr;height:100%}

  /* top bar spans all columns */
  .bar{grid-column:1/4;display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:6px 12px;
    background:var(--panel);border-bottom:1px solid var(--line)}
  .bar b{letter-spacing:.14em}
  .bar .sp{flex:1}
  .bar input.name{width:190px;padding:5px 8px;border:1px solid var(--line);border-radius:4px;background:var(--field)}
  .act{padding:9px 14px;border:1px solid var(--line);border-radius:4px;background:var(--field);cursor:pointer}
  .act:hover{border-color:var(--accent)}
  .act.go{background:var(--accent);border-color:var(--accent);color:#fff}

  /* left tool rail */
  .rail{background:var(--panel);border-right:1px solid var(--line);padding:8px 6px;
    display:flex;flex-direction:column;gap:6px;align-items:center;
    overflow-y:auto;overscroll-behavior:contain}
  .tool{width:44px;height:44px;border:1px solid var(--line);border-radius:6px;background:var(--field);
    cursor:pointer;display:grid;place-items:center;position:relative}
  .tool:hover{border-color:var(--accent)}
  .tool.on{background:var(--accent-bg);border-color:var(--accent)}
  .tool svg{width:22px;height:22px}
  .tool .k{position:absolute;bottom:1px;right:3px;font-size:9px;color:var(--ink2)}

  /* canvas */
  .stage{position:relative;overflow:hidden;background:#eef3f7}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .hint{position:absolute;left:12px;bottom:10px;color:var(--ink2);
    background:#ffffffcc;border:1px solid var(--line2);border-radius:5px;padding:5px 9px}

  /* floating wall/fence finish controls, shown while a draft is in progress */
  .walltools{position:absolute;left:50%;bottom:56px;transform:translateX(-50%);
    display:none;gap:8px;z-index:15}
  .walltools.show{display:flex}
  .walltools button{padding:10px 16px;border-radius:8px;border:1px solid var(--line);
    background:#ffffffee;font-size:14px;cursor:pointer;box-shadow:0 4px 14px #0003}
  #wallFinish{color:var(--ok);border-color:#b6d3b6}
  #wallCancel{color:var(--powder);border-color:#e0b6ab}

  /* floating properties-panel toggle, phone widths only (see @media below) */
  .sidetoggle{display:none;position:fixed;left:16px;bottom:16px;z-index:30;
    width:48px;height:48px;border-radius:50%;border:1px solid var(--line);
    background:var(--accent);color:#fff;font-size:19px;box-shadow:0 4px 14px #0004;cursor:pointer}

  /* right inspector */
  .side{background:var(--panel);border-left:1px solid var(--line);overflow:auto;padding:12px}
  .filerow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .cap{color:#8a99a8;letter-spacing:.12em;font-size:11px;margin:14px 0 6px}
  .cap:first-child{margin-top:0}
  .fld{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:4px 0}
  .fld label{color:var(--ink2)}
  .fld input[type=number],.fld input[type=text],.fld select{width:104px;padding:7px 8px;
    border:1px solid var(--line);border-radius:4px;background:var(--field);text-align:right}
  .fld input[type=text]{text-align:left}
  .fld input[type=checkbox]{width:auto}
  .empty{color:var(--ink2);font-style:italic}
  .op{display:flex;gap:6px;align-items:center;margin:3px 0}
  .op input{width:44px;padding:6px 6px;border:1px solid var(--line);border-radius:3px;background:var(--field);text-align:right}
  .op .rm{margin-left:auto;color:var(--powder);cursor:pointer}
  .stat{display:flex;justify-content:space-between;color:var(--ink2)}
  .stat b{color:var(--ink)}
  .issue{color:var(--powder);margin:5px 0;padding-left:14px;text-indent:-14px}
  .good{color:var(--ok)}
  .rmbtn{width:100%;margin-top:8px;padding:6px;border:1px solid #e0b9b0;background:#fbeeeb;
    color:var(--powder);border-radius:4px;cursor:pointer}

  /* phone-width layout: properties panel becomes a slide-over drawer */
  @media (max-width:700px){
    .app{grid-template-columns:58px 1fr;grid-template-rows:auto 1fr}
    .side{position:fixed;top:0;right:0;bottom:0;width:min(86vw,320px);
      transform:translateX(100%);transition:transform .2s ease;z-index:20;
      box-shadow:-8px 0 24px #0003}
    .side.open{transform:translateX(0)}
    .sidetoggle{display:grid;place-items:center}
  }
</style>

<div class="app">
  <div class="bar">
    <b>SIEGE</b><span style="color:var(--ink2)">plan editor</span>
    <input class="name" id="name" value="my castle" spellcheck="false">
    <span class="sp"></span>
    <button class="act" id="new">new</button>
    <button class="act go" id="toviewer">open in viewer &rarr;</button>
    <input id="file" type="file" accept="application/json,.json" hidden>
  </div>

  <div class="rail" id="rail"></div>

  <div class="stage">
    <canvas id="c"></canvas>
    <div class="hint" id="hint"></div>
    <div class="walltools" id="walltools">
      <button id="wallFinish">&check; Finish</button>
      <button id="wallCancel">&cross; Cancel</button>
    </div>
  </div>

  <div class="side" id="side">
    <div class="filerow">
      <button class="act" id="open">open&hellip;</button>
      <button class="act" id="copy">copy json</button>
      <button class="act" id="download">download</button>
    </div>
    <div class="cap">PLAN DEFAULTS</div>
    <div id="defaults"></div>
    <div class="cap">SELECTED</div>
    <div id="inspector"><div class="empty">nothing selected</div></div>
    <div class="cap">CHECK</div>
    <div id="check"></div>
  </div>
</div>
<button class="sidetoggle" id="sidetoggle" title="Menu" aria-label="Toggle menu">&#9776;</button>

<script type="module">
import { buildPlan, validatePlan } from './buildplan.mjs';

/* ============ the plan (this IS the exported JSON) =================== */
const START = {
  name: 'my castle', camera: 34,
  defaults: { thickness: 0.9, rings: 1, courses: 24, courseH: 0.42, brickL: 0.6 },
  elements: [
    { type: 'tower', id: 'keep', shape: 'square', cx: 0, cz: 0, side: 5.2, crenels: true,
      openings: [{ x: -2.6, z: 0, w: 1.8, from: 0, to: 4 }] },
    { type: 'banner', on: 'keep' },
  ],
};
let plan = structuredClone(START);
let sel = null;                 // selected element (reference into plan.elements)
let selPart = null;             // 'body' | {type:'vertex', i}
let bricks = [], check = null;  // last build + validation

/* ============ tools ================================================= */
const TOOLS = {
  select:   { key:'V', tip:'select · drag to move · Delete to remove' },
  wall:     { key:'W', tip:'click to add corners · Enter or double-click to finish · Esc to cancel' },
  tower:    { key:'T', tip:'click to drop a tower · edit its size on the right' },
  gate:     { key:'G', tip:'click a wall to cut a gate or window through it' },
  keg:      { key:'K', tip:'click to place a powder keg' },
  magazine: { key:'M', tip:'click to place a magazine (a cluster of kegs)' },
  banner:   { key:'B', tip:'click a tower to plant the banner on it · or click open ground' },
  knight:   { key:'N', tip:'click to place a knight · set mortared + facing on the right' },
  tree:     { key:'R', tip:'click to place a tree' },
  forest:   { key:'F', tip:'click to place a scattered cluster of trees' },
  rock:     { key:'O', tip:'click to place a rock' },
  crate:    { key:'C', tip:'click to place a crate' },
  hay:      { key:'H', tip:'click to place a hay bale' },
  clutter:  { key:'L', tip:'click to place a scattered pile · pick rock/crate/hay on the right' },
  fence:    { key:'E', tip:'click to add fence posts · Enter or double-click to finish · Esc to cancel' },
};
const ICON = {
  select:'<path d="M4 3l7 16 2-6 6-2z" fill="#1c2530"/>',
  wall:'<path d="M3 14h4v4H3zM8 14h4v4H8zM13 14h4v4h-4zM5 9h4v4H5zM10 9h4v4h-4zM15 9h4v4h-4z" fill="#b0a894" stroke="#7d7460" stroke-width=".4"/>',
  tower:'<rect x="5" y="4" width="10" height="14" fill="#b0a894" stroke="#7d7460"/><path d="M5 4v-1h2v1h2v-1h2v1h2v-1h2v1" fill="#b0a894"/>',
  gate:'<rect x="5" y="4" width="10" height="15" fill="#b0a894" stroke="#7d7460"/><path d="M8 19v-7a2 2 0 0 1 4 0v7" fill="#eef3f7" stroke="#7d7460"/>',
  keg:'<ellipse cx="10" cy="10" rx="6" ry="7" fill="#a8482f"/><path d="M4 10h12M6 6h8M6 14h8" stroke="#6e2c1c" stroke-width=".8"/>',
  magazine:'<circle cx="7" cy="8" r="3.2" fill="#a8482f"/><circle cx="13" cy="9" r="3.2" fill="#a8482f"/><circle cx="10" cy="13" r="3.2" fill="#a8482f"/>',
  banner:'<path d="M6 3v15" stroke="#8a7a5c" stroke-width="1.4"/><path d="M6 4h9l-2 3 2 3H6z" fill="#b3402f"/>',
  knight:'<circle cx="10" cy="6" r="2.4" fill="#9aa2ac"/><path d="M10 8.5v6" stroke="#5c6470" stroke-width="2"/><path d="M6.5 11h7" stroke="#5c6470" stroke-width="1.6"/><path d="M10 14.5l-3 4M10 14.5l3 4" stroke="#5c6470" stroke-width="1.6"/><path d="M13 9l4-2" stroke="#6b4a2c" stroke-width="1.4"/>',
  tree:'<rect x="9" y="12" width="2" height="6" fill="#6b4a2c"/><path d="M10 2l5 8H5z" fill="#3f7d43"/><path d="M10 6l4 7H6z" fill="#4d8f52"/>',
  forest:'<rect x="6.3" y="13" width="1.4" height="4" fill="#6b4a2c"/><path d="M7 5l3.5 9h-7z" fill="#3f7d43"/><rect x="13.3" y="11" width="1.4" height="4" fill="#6b4a2c"/><path d="M14 4l3.5 8h-7z" fill="#4d8f52"/>',
  rock:'<path d="M4 15l2-6 3-2 4 1 3 4-1 4z" fill="#8a8f94" stroke="#5f6469" stroke-width=".6"/>',
  crate:'<rect x="4" y="5" width="12" height="11" fill="#8a6a3c" stroke="#5c4526"/><path d="M4 5l12 11M16 5L4 16" stroke="#5c4526" stroke-width=".6"/>',
  hay:'<ellipse cx="10" cy="11" rx="7" ry="5" fill="#c9a227" stroke="#967d1c"/><path d="M4 11h12M5 8h10M5 14h10" stroke="#967d1c" stroke-width=".6"/>',
  clutter:'<circle cx="7" cy="9" r="3" fill="#8a8f94"/><circle cx="13" cy="10" r="3" fill="#8a6a3c"/><circle cx="10" cy="14" r="3" fill="#c9a227"/>',
  fence:'<rect x="4" y="6" width="2" height="11" fill="#6b4a2c"/><rect x="9" y="4" width="2" height="13" fill="#6b4a2c"/><rect x="14" y="6" width="2" height="11" fill="#6b4a2c"/><path d="M3 10h15M3 14h15" stroke="#4a3219" stroke-width="1"/>',
};
const PROP_COLOR = {
  rock: ['#8a8f94', '#5f6469'], crate: ['#8a6a3c', '#5c4526'], hay: ['#c9a227', '#967d1c'],
};
const FENCE_COLOR = { 'fence-post': ['#6b4a2c', '#4a3219'], 'fence-rail': ['#8a6a3c', '#5c4526'] };
let tool = 'select';
const rail = document.getElementById('c') && document.getElementById('rail');
for (const [id, T] of Object.entries(TOOLS)) {
  const b = document.createElement('button');
  b.className = 'tool' + (id === tool ? ' on' : '');
  b.dataset.tool = id;
  b.title = id + ' (' + T.key + ')';
  b.innerHTML = `<svg viewBox="0 0 20 22">${ICON[id]}</svg><span class="k">${T.key}</span>`;
  b.onclick = () => setTool(id);
  rail.appendChild(b);
}
function setTool(id) {
  tool = id; wallDraft = null;
  [...rail.children].forEach(c => c.classList.toggle('on', c.dataset.tool === id));
  hint(); draw();
}
function hint() {
  document.getElementById('hint').textContent =
    TOOLS[tool].tip + '   ·   drag empty space to pan · scroll or pinch to zoom';
}
function updateWallTools() {
  document.getElementById('walltools').classList.toggle('show', !!(wallDraft && wallDraft.length));
}
document.getElementById('sidetoggle').onclick = () => document.getElementById('side').classList.toggle('open');
document.getElementById('wallFinish').onclick = () => {
  if (!wallDraft || wallDraft.length < 2) { flashHint('drag out at least two points first'); return; }
  finishWall();
};
document.getElementById('wallCancel').onclick = () => { wallDraft = null; draw(); };

/* ============ canvas + world<->screen =============================== */
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let view = { ox: 0, oz: 0, scale: 14 };     // metres->pixels; origin centred by default
let W = 0, H = 0, dpr = Math.min(2, devicePixelRatio || 1);
function resize() {
  const r = cv.parentElement.getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = W * dpr; cv.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
addEventListener('resize', resize);
const sx = x => W / 2 + (x - view.ox) * view.scale;
const sy = z => H / 2 + (z - view.oz) * view.scale;
const wx = px => (px - W / 2) / view.scale + view.ox;
const wz = py => (py - H / 2) / view.scale + view.oz;

let snapOn = true;
const snap = v => snapOn ? Math.round(v / 0.5) * 0.5 : Math.round(v * 100) / 100;

/* ============ recompute + validate ================================= */
let recomputeQueued = false;
function recompute(validateToo = true) {
  try { bricks = buildPlan(plan); }
  catch (e) { bricks = []; check = { ok:false, issues:['build error: ' + e.message], stats:{} }; drawCheck(); draw(); return; }
  if (validateToo) { check = validatePlan(bricks); drawCheck(); }
  draw();
}
function softRecompute() {          // during drags: rebuild footprints, skip the costly validate
  if (recomputeQueued) return;
  recomputeQueued = true;
  requestAnimationFrame(() => { recomputeQueued = false; recompute(false); });
}

/* ============ drawing ============================================== */
function draw() {
  updateWallTools();
  ctx.clearRect(0, 0, W, H);
  drawGrid();
  drawGun();

  // real brick footprints, straight from the loader
  for (const b of bricks) {
    if (b.isKeg || b.isBanner || b.knight || b.tree || b.prop || b.fence) continue;
    footprint(b, '#b0a894', '#8d846f');
  }
  // single-box clutter (rocks, crates, hay): literally boxes, so the real
  // footprint is right, just coloured by kind
  for (const b of bricks) if (b.prop) footprint(b, ...PROP_COLOR[b.prop]);
  // fence posts + rails: also real box footprints, coloured by tag
  for (const b of bricks) if (b.fence) footprint(b, ...FENCE_COLOR[b.tag]);
  // kegs as powder barrels
  for (const b of bricks) if (b.isKeg) {
    ctx.fillStyle = '#a8482f';
    ctx.beginPath(); ctx.arc(sx(b.p[0]), sy(b.p[2]), Math.max(3, 0.34 * view.scale), 0, 7); ctx.fill();
  }
  // banners
  for (const b of bricks) if (b.isBanner && b.pole) {
    const x = sx(b.p[0]), y = sy(b.p[2]);
    ctx.fillStyle = '#b3402f';
    ctx.beginPath(); ctx.moveTo(x, y - 7); ctx.lineTo(x + 10, y - 4); ctx.lineTo(x, y - 1); ctx.fill();
    ctx.strokeStyle = '#8a7a5c'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, y - 8); ctx.lineTo(x, y + 4); ctx.stroke();
  }
  // knights as little figures, coloured by mortared/loose, with a facing tick
  for (const el of plan.elements) if (el.type === 'knight') {
    const x = sx(el.x), y = sy(el.z), r = Math.max(4, 0.24 * view.scale);
    ctx.fillStyle = el.mortared ? '#5c6470' : '#8a99a8';
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
    ctx.strokeStyle = '#2b323a'; ctx.lineWidth = 1; ctx.stroke();
    const yaw = el.yaw ?? 0;   // matches plans.mjs: yaw maps local +x to world (cos yaw, -sin yaw)
    const fx = x + Math.cos(yaw) * (r + 6), fy = y - Math.sin(yaw) * (r + 6);
    ctx.strokeStyle = '#6b4a2c'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(fx, fy); ctx.stroke();
  }
  // trees as little canopies, straight from the built bricks -- this covers
  // both single 'tree' elements and every tree a 'forest' element scatters
  for (const b of bricks) if (b.tag === 'tree-trunk') {
    const scale = b.h[0] / 0.09;
    const x = sx(b.p[0]), y = sy(b.p[2]);
    const r = Math.max(3, 0.5 * scale * view.scale);
    ctx.fillStyle = '#3f7d43';
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
    ctx.strokeStyle = '#2b4a2c'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = '#6b4a2c';
    ctx.beginPath(); ctx.arc(x, y, Math.max(1.5, r * 0.22), 0, 7); ctx.fill();
  }

  drawHandles();
  drawWallDraft();
}

function footprint(b, fill, stroke) {
  const a = b.yaw, ca = Math.cos(a), sa = Math.sin(a);
  const hx = b.h[0], hz = b.h[2];
  // world corner = center + sxx*hx*(ca,-sa) + szz*hz*(sa,ca)
  const pts = [[-1,-1],[1,-1],[1,1],[-1,1]].map(([u,v]) => [
    b.p[0] + u*hx*ca + v*hz*sa,
    b.p[2] + u*hx*(-sa) + v*hz*ca,
  ]);
  ctx.beginPath();
  pts.forEach((p, i) => i ? ctx.lineTo(sx(p[0]), sy(p[1])) : ctx.moveTo(sx(p[0]), sy(p[1])));
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  if (view.scale > 8) { ctx.strokeStyle = stroke; ctx.lineWidth = 0.5; ctx.stroke(); }
}

function drawGrid() {
  const step = 1;
  const x0 = Math.floor(wx(0) / step) * step, x1 = wx(W);
  const z0 = Math.floor(wz(0) / step) * step, z1 = wz(H);
  ctx.lineWidth = 1;
  for (let x = x0; x <= x1; x += step) {
    ctx.strokeStyle = (Math.round(x) % 5 === 0) ? '#cdd8e2' : '#e0e8ef';
    ctx.beginPath(); ctx.moveTo(sx(x), 0); ctx.lineTo(sx(x), H); ctx.stroke();
  }
  for (let z = z0; z <= z1; z += step) {
    ctx.strokeStyle = (Math.round(z) % 5 === 0) ? '#cdd8e2' : '#e0e8ef';
    ctx.beginPath(); ctx.moveTo(0, sy(z)); ctx.lineTo(W, sy(z)); ctx.stroke();
  }
  // origin
  ctx.strokeStyle = '#b6c3ce'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx(0)-6, sy(0)); ctx.lineTo(sx(0)+6, sy(0));
  ctx.moveTo(sx(0), sy(0)-6); ctx.lineTo(sx(0), sy(0)+6); ctx.stroke();
}

/* the gun sits to the west (-x) and everything the game does assumes it.
   Show it so you build the weak side toward the guns, not away from them. */
function drawGun() {
  const gy = sy(0);
  ctx.strokeStyle = '#9fb0bf'; ctx.setLineDash([5, 5]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(sx(0), gy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#30363d';
  ctx.beginPath(); ctx.moveTo(6, gy - 6); ctx.lineTo(24, gy); ctx.lineTo(6, gy + 6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#5b6b7c'; ctx.font = '11px ui-monospace,monospace';
  ctx.fillText('gun (west)', 6, gy - 10);
}

function drawHandles() {
  for (const el of plan.elements) {
    const on = el === sel;
    if (el.type === 'wall' || el.type === 'fence') {
      const p = el.path;
      const dash = el.type === 'fence' ? '#a3855c' : '#7d95aa';
      ctx.strokeStyle = on ? '#2f6fb0' : dash;
      ctx.lineWidth = on ? 2 : 1; ctx.setLineDash(on ? [] : [3, 3]);
      ctx.beginPath();
      p.forEach((v, i) => i ? ctx.lineTo(sx(v[0]), sy(v[1])) : ctx.moveTo(sx(v[0]), sy(v[1])));
      if (el.closed) ctx.closePath();
      ctx.stroke(); ctx.setLineDash([]);
      if (on) p.forEach(v => handleDot(sx(v[0]), sy(v[1]), '#2f6fb0'));
    } else if (el.type === 'tower') {
      const cx = sx(el.cx), cz = sy(el.cz);
      if (on) { ctx.strokeStyle = '#2f6fb0'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cz, 5, 0, 7); ctx.stroke(); }
    } else if (el.type === 'keg' || el.type === 'magazine' || el.type === 'banner'
            || el.type === 'knight' || el.type === 'tree' || el.type === 'forest'
            || el.type === 'rock' || el.type === 'crate' || el.type === 'hay' || el.type === 'clutter') {
      if (on) {
        const x = el.x ?? bannerXZ(el)[0], z = el.z ?? bannerXZ(el)[1];
        handleDot(sx(x), sy(z), '#2f6fb0', 7);
      }
    }
    // openings as little gate marks
    for (const o of el.openings || []) {
      ctx.strokeStyle = '#2f6fb0'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(sx(o.x), sy(o.z), Math.max(4, o.w * 0.5 * view.scale), 0, 7); ctx.stroke();
    }
  }
}
function handleDot(x, y, c, r = 4) {
  ctx.fillStyle = '#fff'; ctx.strokeStyle = c; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.rect(x - r/2, y - r/2, r, r); ctx.fill(); ctx.stroke();
}

let wallDraft = null;   // array of [x,z] while drawing a wall
function drawWallDraft() {
  if (!wallDraft) return;

/* banner world position (explicit, or resolved from its tower) */
function bannerXZ(el) {
  if (el.on == null) return [el.x, el.z];
  const t = plan.elements.find(e => e.id === el.on);
  if (!t) return [el.x ?? 0, el.z ?? 0];
  const inset = (t.thickness ?? plan.defaults.thickness ?? 0.9) / 2;
  const half = t.shape === 'ngon' ? (t.r ?? 3) - inset : (t.side ?? 5) / 2 - inset;
  return [t.cx + half, t.cz];

/* ============ picking =============================================== */
function pick(x, z) {
  // point elements first (easiest to grab)
  for (const el of plan.elements) {
    if (el.type === 'keg' || el.type === 'magazine' || el.type === 'knight' || el.type === 'tree'
     || el.type === 'rock' || el.type === 'crate' || el.type === 'hay') {
      if (Math.hypot(el.x - x, el.z - z) < 0.7) return { el, part:'body' };
    } else if (el.type === 'forest') {
      if (Math.hypot(el.x - x, el.z - z) < (el.spread ?? 2.5) + 0.5) return { el, part:'body' };
    } else if (el.type === 'clutter') {
      if (Math.hypot(el.x - x, el.z - z) < (el.spread ?? 1.6) + 0.5) return { el, part:'body' };
    } else if (el.type === 'banner') {
      const [bx, bz] = bannerXZ(el);
      if (Math.hypot(bx - x, bz - z) < 0.8) return { el, part:'body' };
    }
  }
  // wall/fence vertices, then tower centres, then bodies
  for (const el of plan.elements) if (el.type === 'wall' || el.type === 'fence') {
    for (let i = 0; i < el.path.length; i++)
      if (Math.hypot(el.path[i][0] - x, el.path[i][1] - z) < 0.6) return { el, part:{ type:'vertex', i } };
  }
  for (const el of plan.elements) if (el.type === 'tower') {
    const half = el.shape === 'ngon' ? (el.r ?? 3) : (el.side ?? 5) / 2;
    if (Math.abs(el.cx - x) < half && Math.abs(el.cz - z) < half) return { el, part:'body' };
  }
  for (const el of plan.elements) if (el.type === 'wall' || el.type === 'fence') {
    for (let i = 0; i + 1 < el.path.length + (el.closed ? 1 : 0); i++) {
      const a = el.path[i], b = el.path[(i + 1) % el.path.length];
      if (segDist(x, z, a[0], a[1], b[0], b[1]) < (el.thickness ?? 1) / 2 + 0.3) return { el, part:'body' };

function segDist(px, pz, ax, az, bx, bz) {

    const path = el.type === 'wall' ? el.path
      : (el.shape === 'ngon' ? ngonPts(el) : squarePts(el));
    const closed = el.type === 'tower' || el.closed;
    for (let i = 0; i + 1 < path.length + (closed ? 1 : 0); i++) {
      const a = path[i], b = path[(i + 1) % path.length];
      const d = segDist(x, z, a[0], a[1], b[0], b[1]);

/* ============ pointer =============================================== */
let mouseW = null, dragging = null, panning = null, downPt = null, movedFar = false;

  if (pointers.size === 2) {
    dragging = null; panning = null; pinchOccurred = true;
    const [a, b] = [...pointers.values()];
    pinchStart = {
      d: Math.hypot(a.x - b.x, a.y - b.y),
      scale: view.scale,
      midWX: wx((a.x + b.x) / 2),
      midWZ: wz((a.y + b.y) / 2),
    };
    return;
  }
  if (pointers.size > 2) return;   // ignore a 3rd+ finger

  pinchOccurred = false;
  const x = snap(wx(e.offsetX)), z = snap(wz(e.offsetY));
  downPt = { sx:e.offsetX, sy:e.offsetY, x, z }; movedFar = false;

  if (e.button === 1 || (tool === 'select' && e.shiftKey)) { panning = { ox:view.ox, oz:view.oz, sx:e.offsetX, sy:e.offsetY }; return; }

  if (tool === 'select') {
    const hit = pick(wx(e.offsetX), wz(e.offsetY));
    if (hit) { select(hit.el, hit.part); dragging = { el:hit.el, part:hit.part, x, z }; }
    else { select(null); panning = { ox:view.ox, oz:view.oz, sx:e.offsetX, sy:e.offsetY }; }
    return;

cv.addEventListener('pointermove', e => {

    view.oz = pinchStart.midWZ - (midY - H / 2) / view.scale;

  }

  mouseW = [snap(wx(e.offsetX)), snap(wz(e.offsetY))];
  if (downPt && Math.hypot(e.offsetX - downPt.sx, e.offsetY - downPt.sy) > 3) movedFar = true;

  if (panning) {
    view.ox = panning.ox - (e.offsetX - panning.sx) / view.scale;
    view.oz = panning.oz - (e.offsetY - panning.sy) / view.scale;

function moveBy(d, x, z) {
  const el = d.el, dx = x - d.x, dz = z - d.z;
  if (el.type === 'wall' || el.type === 'fence') {
    if (d.part && d.part.type === 'vertex') { el.path[d.part.i] = [x, z]; }
    else { el.path = el.path.map(v => [v[0] + dx, v[1] + dz]); (el.openings||[]).forEach(o => { o.x += dx; o.z += dz; }); }
  } else if (el.type === 'tower') {
    el.cx += dx; el.cz += dz; (el.openings||[]).forEach(o => { o.x += dx; o.z += dz; });
  } else { el.x = x; el.z = z; }
  d.x = x; d.z = z;
}

/* place a new element for the active tool */
function placeAt(x, z, rawx, rawz) {
  if (tool === 'tower') {
    const el = { type:'tower', id:uid('tower'), shape:'square', cx:x, cz:z, side:5,
      crenels:true, openings:[] };
    add(el); return;
  }
  if (tool === 'keg') { add({ type:'keg', x, z, y:0.45 }); return; }
  if (tool === 'knight') { add({ type:'knight', x, z, yaw:0, baseY:0, mortared:false }); return; }
  if (tool === 'magazine') { add({ type:'magazine', x, z, y:0.45, n:4, spread:0.9,
      spec:{ blastR:3.0, power:2.2, crater:1.8, impulse:30000 } }); return; }
  if (tool === 'tree') { add({ type:'tree', x, z, baseY:0, scale:1 }); return; }
  if (tool === 'forest') { add({ type:'forest', x, z, n:6, spread:2.5, baseY:0, scale:1 }); return; }
  if (tool === 'rock' || tool === 'crate' || tool === 'hay') {
    add({ type:tool, x, z, baseY:0, scale:1 }); return;
  }
  if (tool === 'clutter') { add({ type:'clutter', x, z, kind:'rock', n:5, spread:1.6, baseY:0, scale:1 }); return; }
  if (tool === 'gate') {
    const w = nearestWall(rawx, rawz);
    if (!w) { flashHint('click closer to a wall to cut a gate'); return; }
    if (!w.openings) w.openings = [];
    w.openings.push({ x, z, w:2.4, from:0, to:4 });
    select(w, 'body'); recompute(); return;
  }
  if (tool === 'banner') {
    const t = pick(rawx, rawz);
    if (t && t.el.type === 'tower') {
      if (!t.el.id) t.el.id = uid('tower');
      dropBanners();
      add({ type:'banner', on:t.el.id });
    } else {
      dropBanners();
      const y = (plan.defaults.courses ?? 24) * (plan.defaults.courseH ?? 0.42);
      add({ type:'banner', x, z, y });
    }
    return;
  }

}
function dropBanners() { plan.elements = plan.elements.filter(e => e.type !== 'banner'); }

function finishWall() {
  if (!wallDraft || wallDraft.length < 2) { wallDraft = null; draw(); return; }
  const el = tool === 'fence'
    ? { type:'fence', path:wallDraft.slice(), spacing:1.4, baseY:0, scale:1 }
    : { type:'wall', path:wallDraft.slice(), closed:false, crenels:true, openings:[] };
  wallDraft = null;
  add(el); setTool('select');
}
addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (e.target.matches('input,select,textarea')) return;
  if (e.key === 'Enter' && (tool === 'wall' || tool === 'fence')) return finishWall();
  if (e.key === 'Escape') { wallDraft = null; draw(); return; }
  if ((e.key === 'Delete' || e.key === 'Backspace') && sel) { removeSel(); return; }
  for (const [id, T] of Object.entries(TOOLS)) if (T.key.toLowerCase() === k) return setTool(id);
});

let uidN = 0;

  insp.append(row('heave', num(() => g(el.spec,'impulse',2200), v => el.spec.impulse = v, 100)));
}
const span = t => { const s = document.createElement('span'); s.textContent = t; s.style.color='#5b6b7c'; return s; };
const lbl = t => { const s = document.createElement('span'); s.textContent = t; s.style.color='#8a99a8'; return s; };
function rmButton() { const b = document.createElement('button'); b.className='rmbtn'; b.textContent='delete this element';
  b.onclick = removeSel; return b; }

/* plan-wide defaults */
const defBox = document.getElementById('defaults');
function drawDefaults() {
  defBox.innerHTML = '';
  const mk = (k, step) => num(() => plan.defaults[k], v => { plan.defaults[k] = v; }, step);
  defBox.append(row('camera', num(() => plan.camera ?? 34, v => plan.camera = v, 1)));
  defBox.append(row('thickness', mk('thickness')));
  defBox.append(row('walls', choice([1,2,3,4,5], () => plan.defaults.rings, v => plan.defaults.rings = parseInt(v, 10))));
  defBox.append(row('height', choice(Array.from({length:24}, (_, i) => i + 1), () => plan.defaults.courses, v => plan.defaults.courses = parseInt(v, 10))));
  defBox.append(row('course h', mk('courseH')));
  defBox.append(row('brick len', mk('brickL')));
  const s = document.createElement('div'); s.className='fld';
  const l = document.createElement('label'); l.textContent = 'snap to ½m';
  s.append(l, bool(() => snapOn, v => snapOn = v)); defBox.append(s);
}

/* ============ validation panel ===================================== */
function drawCheck() {
  const box = document.getElementById('check');
  box.innerHTML = '';
  if (!check) return;
  const s = check.stats || {};
  const line = (a, b) => { const d = document.createElement('div'); d.className='stat';
    d.innerHTML = `<span>${a}</span><b>${b}</b>`; return d; };
  box.append(line('bricks', s.bricks ?? 0));
  box.append(line('joints', s.joints ?? 0));
  box.append(line('kegs', s.kegs ?? 0));
  box.append(line('knights', s.knights ?? 0));
  box.append(line('trees', s.trees ?? 0));
  box.append(line('clutter', s.props ?? 0));
  box.append(line('fences', s.fences ?? 0));
  box.append(line('components', s.components ?? 0));
  if (check.ok) { const d = document.createElement('div'); d.className='good'; d.textContent='✓ stands as one piece, banner bonded'; box.append(d); }
  else for (const is of check.issues) { const d = document.createElement('div'); d.className='issue'; d.textContent='• ' + is; box.append(d); }
}

/* ============ file: new / open / save / hand-off =================== */
document.getElementById('name').oninput = e => plan.name = e.target.value;
document.getElementById('new').onclick = () => {
  plan = { name:'my castle', camera:34,
    defaults:{ thickness:0.9, rings:1, courses:24, courseH:0.42, brickL:0.6 }, elements:[] };
  document.getElementById('name').value = plan.name;
  select(null); drawDefaults(); recompute();
};
document.getElementById('download').onclick = () => {
  const blob = new Blob([JSON.stringify(cleanPlan(), null, 2)], { type:'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = (plan.name || 'plan').replace(/\s+/g, '_') + '.json'; a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById('copy').onclick = async () => {
  try { await navigator.clipboard.writeText(JSON.stringify(cleanPlan(), null, 2)); flashHint('copied JSON to clipboard'); }
  catch { flashHint('clipboard blocked — use download instead'); }
};
document.getElementById('toviewer').onclick = () => {
  try { localStorage.setItem('siege.pendingPlan', JSON.stringify(cleanPlan())); }
  catch (e) { flashHint('hand-off blocked: ' + e.message); return; }
  window.open('viewer.html', '_blank');
};
const fileEl = document.getElementById('file');
document.getElementById('open').onclick = () => fileEl.click();
fileEl.onchange = async () => { const f = fileEl.files[0]; if (f) await loadFile(f); fileEl.value = ''; };
cv.addEventListener('dragover', e => e.preventDefault());
cv.addEventListener('drop', async e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) await loadFile(f); });
async function loadFile(f) {
  try {
    const p = JSON.parse(await f.text());
    if (!Array.isArray(p.elements)) throw new Error('not a plan (no elements array)');
    plan = p; plan.defaults = plan.defaults || { thickness:0.9, rings:1, courses:24, courseH:0.42, brickL:0.6 };
    document.getElementById('name').value = plan.name || 'castle';
    select(null); drawDefaults(); recompute(); flashHint('loaded ' + (plan.name || f.name));
  } catch (err) { flashHint('could not open: ' + err.message); }
}
/* drop editor-internal noise before writing JSON (currently nothing extra to strip) */
function cleanPlan() { plan.name = document.getElementById('name').value || 'castle'; return plan; }

let hintT = 0;
function flashHint(t) { const h = document.getElementById('hint'); h.textContent = t; clearTimeout(hintT);
  hintT = setTimeout(hint, 2200); }

/* ============ go ==================================================== */
drawDefaults(); hint(); resize(); recompute();
</script>
